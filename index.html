<!DOCTYPE html>
<html data-bs-theme="auto" lang="pl">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Power Monitor - PWA BLE</title>
    <meta name="description" content="Power Monitor - Aplikacja PWA do monitorowania zasilania via Bluetooth Low Energy">
    <meta name="theme-color" content="#0d6efd">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Power Monitor">
    <meta name="application-name" content="Power Monitor">
    <meta name="msapplication-TileColor" content="#0d6efd">
    <meta name="mobile-web-app-capable" content="yes">
    <script type="application/ld+json">
        {
            "@context": "http://schema.org",
            "@type": "WebSite",
            "name": "Power Monitor",
            "url": "https://github.com/Lukasz230V/Power-monitor"
        }
    </script>
    <script>
        (function() {

            // JavaScript snippet handling Dark/Light mode switching

            const getStoredTheme = () => localStorage.getItem('theme');
            const setStoredTheme = theme => localStorage.setItem('theme', theme);
            const forcedTheme = document.documentElement.getAttribute('data-bss-forced-theme');

            const getPreferredTheme = () => {

                if (forcedTheme) return forcedTheme;

                const storedTheme = getStoredTheme();
                if (storedTheme) {
                    return storedTheme;
                }

                const pageTheme = document.documentElement.getAttribute('data-bs-theme');

                if (pageTheme) {
                    return pageTheme;
                }

                return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }

            const setTheme = theme => {
                if (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.documentElement.setAttribute('data-bs-theme', 'dark');
                } else {
                    document.documentElement.setAttribute('data-bs-theme', theme);
                }
            }

            setTheme(getPreferredTheme());

            const showActiveTheme = (theme, focus = false) => {
                const themeSwitchers = [].slice.call(document.querySelectorAll('.theme-switcher'));

                if (!themeSwitchers.length) return;

                document.querySelectorAll('[data-bs-theme-value]').forEach(element => {
                    element.classList.remove('active');
                    element.setAttribute('aria-pressed', 'false');
                });

                const iconTheme = theme === 'auto' ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : theme;

                for (const themeSwitcher of themeSwitchers) {

                    const adaptIcon = !!themeSwitcher.dataset.bsAdaptIcon;

                    if (adaptIcon) {
                        const btnIcon = themeSwitcher.querySelector('[data-bss-adaptable]');

                        try {
                            const themeIcons = JSON.parse(themeSwitcher.dataset.bssIcons || "{}");
                            const newIconMarkup = themeIcons[iconTheme];

                            const template = document.createElement("template");
                            template.innerHTML = newIconMarkup;

                            const newIconFragment = template.content.cloneNode(true);

                            if (newIconFragment?.children?.length) {
                                newIconFragment.children[0].dataset.bssAdaptable = true;
                            }

                            btnIcon.replaceWith(newIconFragment);
                        } catch (e) {}
                    }

                    const btnToActivate = themeSwitcher.querySelector('[data-bs-theme-value="' + theme + '"]');

                    if (btnToActivate) {
                        btnToActivate.classList.add('active');
                        btnToActivate.setAttribute('aria-pressed', 'true');
                    }
                }
            }

            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
                const storedTheme = getStoredTheme();
                if (storedTheme !== 'light' && storedTheme !== 'dark') {
                    setTheme(getPreferredTheme());
                }
            });

            window.addEventListener('DOMContentLoaded', () => {
                showActiveTheme(getPreferredTheme());

                document.querySelectorAll('[data-bs-theme-value]')
                    .forEach(toggle => {
                        toggle.addEventListener('click', (e) => {
                            e.preventDefault();
                            const theme = toggle.getAttribute('data-bs-theme-value');
                            setStoredTheme(theme);
                            setTheme(theme);
                            showActiveTheme(theme);
                        })
                    })
            });
        })();
    </script>
    <link rel="icon" type="image/png" sizes="1024x1024" href="assets/img/pmonitor.png">
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="manifest" href="manifest.json" crossorigin="use-credentials">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
    <div class="container py-4">
        <div class="row g-3">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h6 class="text-uppercase small fw-bold text-muted card-title">Aktualny prąd (RMS)</h6>
                        <p class="fw-bold text-center text-primary mb-3 card-text h2" id="adc-value">0.0A</p>
                        <hr>
                        <h6 class="text-uppercase small fw-bold text-muted card-title">Prąd zadany</h6>
                        <div class="input-group input-group-sm"><input class="form-control" type="number" disabled="" id="set-current-input" min="0.10" placeholder="0.10" step="0.01"><span class="input-group-text">A</span><button class="btn btn-outline-primary disabled disabled" disabled="" id="set-current-btn" type="button">WYŚLIJ</button></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h6 class="text-uppercase small fw-bold text-muted card-title">Czas bezczynności</h6>
                        <div class="d-flex align-items-center gap-2 mb-3"><input class="form-range flex-grow-1" type="range" disabled="" id="idle-time-slider" max="60" min="1" step="1" value="1"><span class="fw-bold text-primary" id="idle-time-display" style="min-width:40px;font-size:1.1rem;">1m</span><button class="btn btn-primary btn-sm disabled disabled" id="set-idle-btn" type="button" disabled="">WYŚLIJ</button></div>
                        <div class="btn-group btn-group-sm w-100" role="group"><button class="btn btn-outline-secondary disabled disabled idle-preset" type="button" data-value="1" disabled="">1m</button><button class="btn btn-outline-secondary disabled disabled idle-preset" type="button" data-value="15" disabled="">15m</button><button class="btn btn-outline-secondary disabled disabled idle-preset" type="button" data-value="30" disabled="">30m</button><button class="btn btn-outline-secondary disabled disabled idle-preset" type="button" data-value="60" disabled="">60m</button></div>
                    </div>
                </div>
            </div>
            <div class="col-md-12 col-lg-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body d-flex flex-column">
                        <h6 class="text-uppercase small fw-bold text-muted card-title">Status Wyjścia</h6><button class="btn btn-secondary w-100 h-100 flex-grow-1 py-3" id="output-control" type="button" style="font-size:1.2rem;font-weight:bold;">CZEKAM NA DANE...</button>
                    </div>
                </div>
            </div>
            <div class="col-12 mt-2">
                <div class="card border-primary shadow-sm">
                    <div class="card-body text-center d-flex flex-column justify-content-between align-items-center flex-md-row py-2">
                        <div class="d-flex align-items-center mb-2 mb-md-0">
                            <h6 class="text-uppercase small fw-bold text-muted me-3 mb-0">Urządzenie:</h6><button class="btn btn-primary btn-sm shadow-sm px-4" id="connect-ble" type="button">POŁĄCZ</button><button class="btn btn-outline-secondary btn-sm ms-2" id="forget-device-btn" type="button" style="display:none;">Zapomnij</button>
                        </div>
                        <div class="d-flex align-items-center">
                            <div class="form-check text-start me-4 mb-0" style="font-size:0.8rem;"><input class="form-check-input" type="checkbox" id="remember-device-chk"><label class="form-check-label text-muted" for="remember-device-chk">Autopołączenie</label></div>
                            <div class="d-flex align-items-center ps-4 border-start"><span class="text-muted me-2" id="ble-status-dot" style="font-size:1.2rem;line-height:1;">●</span><span class="text-uppercase small fw-bold text-muted">Status</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div><script>
    // Service Worker Registration for PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .then(registration => {
                console.log('✅ Service Worker zaregistrowany:', registration);
            })
            .catch(error => {
                console.error('❌ Błąd rejestracji Service Worker:', error);
            });
    }
</script>
    <script src="assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="assets/js/ble-connection.js"></script>
</body>

</html>
