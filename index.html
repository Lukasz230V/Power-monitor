<!DOCTYPE html>
<html data-bs-theme="auto" lang="pl">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">

    <!-- PWA Meta Tags -->
    <meta name="description" content="Power Monitor - Aplikacja PWA do monitorowania zasilania via Bluetooth Low Energy">
    <meta name="theme-color" content="#0d6efd">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Power Monitor">
    <meta name="application-name" content="Power Monitor">
    <meta name="msapplication-TileColor" content="#0d6efd">
    <meta name="mobile-web-app-capable" content="yes">

    <title>Power Monitor - PWA BLE</title>

    <!-- Icons & Manifest -->
    <link rel="icon" type="image/png" sizes="1024x1024" href="assets/img/pmonitor.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/img/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/img/icon-512.png">
    <link rel="apple-touch-icon" href="assets/img/icon-192.png">
    <link rel="manifest" href="manifest.json" crossorigin="use-credentials">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
   
    <link rel="stylesheet" href="assets/css/custom.css">
    <script>
        (function() {

            // JavaScript snippet handling Dark/Light mode switching

            const getStoredTheme = () => localStorage.getItem('theme');
            const setStoredTheme = theme => localStorage.setItem('theme', theme);
            const forcedTheme = document.documentElement.getAttribute('data-bss-forced-theme');

            const getPreferredTheme = () => {

                if (forcedTheme) return forcedTheme;

                const storedTheme = getStoredTheme();
                if (storedTheme) {
                    return storedTheme;
                }

                const pageTheme = document.documentElement.getAttribute('data-bs-theme');

                if (pageTheme) {
                    return pageTheme;
                }

                return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }

            const setTheme = theme => {
                if (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.documentElement.setAttribute('data-bs-theme', 'dark');
                } else {
                    document.documentElement.setAttribute('data-bs-theme', theme);
                }
            }

            setTheme(getPreferredTheme());

            const showActiveTheme = (theme, focus = false) => {
                const themeSwitchers = [].slice.call(document.querySelectorAll('.theme-switcher'));

                if (!themeSwitchers.length) return;

                document.querySelectorAll('[data-bs-theme-value]').forEach(element => {
                    element.classList.remove('active');
                    element.setAttribute('aria-pressed', 'false');
                });

                const iconTheme = theme === 'auto' ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : theme;

                for (const themeSwitcher of themeSwitchers) {

                    const adaptIcon = !!themeSwitcher.dataset.bsAdaptIcon;

                    if (adaptIcon) {
                        const btnIcon = themeSwitcher.querySelector('[data-bss-adaptable]');

                        try {
                            const themeIcons = JSON.parse(themeSwitcher.dataset.bssIcons || "{}");
                            const newIconMarkup = themeIcons[iconTheme];

                            const template = document.createElement("template");
                            template.innerHTML = newIconMarkup;

                            const newIconFragment = template.content.cloneNode(true);

                            if (newIconFragment?.children?.length) {
                                newIconFragment.children[0].dataset.bssAdaptable = true;
                            }

                            btnIcon.replaceWith(newIconFragment);
                        } catch (e) {}
                    }

                    const btnToActivate = themeSwitcher.querySelector('[data-bs-theme-value="' + theme + '"]');

                    if (btnToActivate) {
                        btnToActivate.classList.add('active');
                        btnToActivate.setAttribute('aria-pressed', 'true');
                    }
                }
            }

            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
                const storedTheme = getStoredTheme();
                if (storedTheme !== 'light' && storedTheme !== 'dark') {
                    setTheme(getPreferredTheme());
                }
            });

            window.addEventListener('DOMContentLoaded', () => {
                showActiveTheme(getPreferredTheme());

                document.querySelectorAll('[data-bs-theme-value]')
                    .forEach(toggle => {
                        toggle.addEventListener('click', (e) => {
                            e.preventDefault();
                            const theme = toggle.getAttribute('data-bs-theme-value');
                            setStoredTheme(theme);
                            setTheme(theme);
                            showActiveTheme(theme);
                        })
                    })
            });
        })();
    </script>
</head>

<body>
<div class="container">
<div class="row p-1">
    <div class="col text-center py-4">
        <button class="btn btn-primary" id="connect-ble" type="button">POŁĄCZ Z URZĄDZENIEM</button>
        <button class="btn btn-outline-secondary btn-sm" id="forget-device-btn" type="button" style="display:none; margin-left: 10px;">
            🗑️ Zapomnij urządzenie
        </button>
    </div>
</div>
    <div class="row p-1">
        <div class="col-md-6 mb-2">
            <div class="card h-100">
                <div class="card-body">
                    <h4 class="card-title">Aktualny prąd (RMS):</h4>
                    <p class="mb-3 card-text h4" id="adc-value">0.0A</p>
                    <hr>
                    <h4 class="card-title">Prąd zadany:</h4>
                    <div class="input-group"><input class="form-control" type="number" disabled="" id="set-current-input" placeholder="0.10" step="0.01" min="0.10"><span class="input-group-text">A</span><button class="btn btn-outline-primary disabled disabled" disabled="" id="set-current-btn" type="button">USTAW</button></div>
                </div>
            </div>
        </div>
        <div class="col-md-6 mb-2">
            <div class="card h-100">
                <div class="card-body">
                    <h4 class="card-title">Czas bezczynności:</h4>
                    <div class="d-flex align-items-center gap-2 mb-3"><input class="form-range flex-grow-1" type="range" disabled="" id="idle-time-slider" max="60" min="1" step="1" value="1"><span class="fw-bold text-primary" id="idle-time-display" style="min-width:50px;font-size:1.2rem;">1m</span><button class="btn btn-primary btn-sm disabled disabled" id="set-idle-btn" type="button" disabled="">USTAW</button></div>
                    <div class="btn-group w-100" role="group"><button class="btn btn-outline-secondary btn-sm disabled disabled idle-preset" type="button" data-value="1" disabled="">1m</button><button class="btn btn-outline-secondary btn-sm disabled disabled idle-preset" type="button" data-value="5" disabled="">5m</button><button class="btn btn-outline-secondary btn-sm disabled disabled idle-preset" type="button" data-value="15" disabled="">15m</button><button class="btn btn-outline-secondary btn-sm disabled disabled idle-preset" type="button" data-value="30" disabled="">30m</button><button class="btn btn-outline-secondary btn-sm disabled disabled idle-preset" type="button" data-value="60" disabled="">60m</button></div>
                </div>
            </div>
        </div>
        <div class="col-md-6 mb-2">
            <div class="card h-100">
                <div class="card-body d-flex flex-column">
                    <h4 class="card-title">Status Wyjścia:</h4><button class="btn btn-secondary w-100 h-100 flex-grow-1 py-4" id="output-control" type="button" style="font-size:1.5rem;font-weight:bold;">CZEKAM NA DANE...</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="assets/bootstrap/js/bootstrap.min.js"></script>
<script src="assets/js/ble-connection.js"></script>
<script>
    // Service Worker Registration for PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js')
            .then(registration => {
                console.log('✅ Service Worker zaregistrowany:', registration);
            })
            .catch(error => {
                console.error('❌ Błąd rejestracji Service Worker:', error);
            });
    }
</script>
</body>

</html>
